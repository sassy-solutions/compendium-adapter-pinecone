name: Template cleanup

# Runs ONCE on the first push to main of a repository generated from this template.
# Renames the `Sample` placeholders to a vendor name derived from the repo slug
# (`compendium-adapter-<vendor>` → `<Vendor>` with first letter capitalised),
# then deletes this workflow file so it doesn't run again.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  rename:
    runs-on: ubuntu-latest
    # Skip in the template repo itself
    if: github.repository != 'sassy-solutions/template-compendium-adapter-dotnet'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute vendor from repo name
        id: vendor
        run: |
          repo="${GITHUB_REPOSITORY##*/}"  # "compendium-adapter-stripe" → "compendium-adapter-stripe"
          # Strip "compendium-adapter-" prefix if present
          vendor="${repo#compendium-adapter-}"
          # PascalCase: capitalise first letter, lowercase rest of each word; here we just title-case the slug
          # Convert hyphens to nothing and title-case (basic — accept that users can fix manually for compounds)
          vendor_pascal=$(echo "$vendor" | python3 -c "import sys; s=sys.stdin.read().strip(); print(''.join(w.capitalize() for w in s.replace('-','_').replace('.','_').split('_')))")
          echo "vendor_pascal=$vendor_pascal" >> "$GITHUB_OUTPUT"
          echo "vendor_lower=$vendor" >> "$GITHUB_OUTPUT"
          echo "Renaming Sample → $vendor_pascal (slug: $vendor)"

      - name: Find-and-replace placeholders
        env:
          PASCAL: ${{ steps.vendor.outputs.vendor_pascal }}
          LOWER:  ${{ steps.vendor.outputs.vendor_lower }}
        run: |
          # Replace 'Sample' in source text files (csproj, cs, sln, md, yml, json, props, config)
          find . -type f \
            \( -name '*.cs' -o -name '*.csproj' -o -name '*.sln' -o -name '*.md' \
               -o -name '*.yml' -o -name '*.yaml' -o -name '*.json' -o -name '*.props' \
               -o -name '*.config' \) \
            -not -path './.git/*' \
            -exec sed -i "s/Sample/${PASCAL}/g" {} +
          find . -type f \
            \( -name '*.cs' -o -name '*.csproj' -o -name '*.sln' -o -name '*.md' \
               -o -name '*.yml' -o -name '*.yaml' -o -name '*.json' -o -name '*.props' \
               -o -name '*.config' \) \
            -not -path './.git/*' \
            -exec sed -i "s/sample/${LOWER}/g" {} +

      - name: Rename folders and files
        env:
          PASCAL: ${{ steps.vendor.outputs.vendor_pascal }}
        run: |
          # Folder renames (depth-first so child paths don't break)
          for d in $(find . -type d -name '*Sample*' -not -path './.git/*' | sort -r); do
            new="${d//Sample/${PASCAL}}"
            mv "$d" "$new"
          done
          # File renames
          for f in $(find . -type f -name '*Sample*' -not -path './.git/*' | sort -r); do
            new="${f//Sample/${PASCAL}}"
            mv "$f" "$new"
          done

      - name: Verify build
        run: |
          dotnet --version
          dotnet build -c Release || true  # don't fail the workflow if user needs to fix something

      - name: Delete this workflow + initial commit
        run: |
          rm -f .github/workflows/template-cleanup.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: initial scaffold for ${{ steps.vendor.outputs.vendor_pascal }} (template-cleanup ran)"
          git push origin main
